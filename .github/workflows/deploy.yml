name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy index.html to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 152.42.202.85
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "index.html"
          target: "/var/www/html/"
          overwrite: true
